<!DOCTYPE html>
<html lang='ar' dir='rtl'>
<head>
<meta charset='UTF-8'/>
<meta name='viewport' content='width=device-width,initial-scale=1.0'/>
<title>ياسر ⭐</title>
<link href='https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap' rel='stylesheet'/>
<style>*{box-sizing:border-box;margin:0;padding:0}
:root{--night:#07091a;--deep:#0e1225;--card:#141830;--rim:#252d50;--gold:#f5c42c;--gold2:#ffe270;--teal:#1de9b6;--violet:#7c5cfc;--rose:#ff5f8f;--txt:#e8ecff;--sub:#7580a8;}
body{font-family:'Tajawal',sans-serif;background:var(--night);color:var(--txt);min-height:100vh;padding-bottom:40px;}
.hero{position:relative;background:linear-gradient(160deg,#120c2e 0%,#0a1230 60%,#07091a 100%);padding:28px 20px 36px;text-align:center;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 0%,rgba(124,92,252,.18),transparent);pointer-events:none;}
.hero::after{content:'✦ ✦ ✦';position:absolute;top:12px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:12px;color:rgba(245,196,44,.35);pointer-events:none;}
.photo-ring{width:130px;height:130px;border-radius:16px;border:3px solid var(--gold);overflow:hidden;margin:0 auto 14px;box-shadow:0 0 28px rgba(245,196,44,.5);}
.photo-ring img{width:100%;height:100%;object-fit:cover;object-position:100% 10%;}
.hero-name{font-size:26px;font-weight:900;letter-spacing:.5px;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero-sub{font-size:13px;color:var(--sub);margin-top:3px;}
.tabs{display:flex;background:var(--deep);border-bottom:1px solid var(--rim);position:sticky;top:0;z-index:10;}
.tab{flex:1;padding:13px 0;text-align:center;font-size:14px;font-weight:700;color:var(--sub);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.panel{display:none;padding:18px 16px 0;}
.panel.active{display:block;}
.score-card{background:linear-gradient(135deg,#16103a,#0d1a32);border:1.5px solid rgba(245,196,44,.25);border-radius:18px;padding:22px 20px;text-align:center;position:relative;overflow:hidden;margin-bottom:18px;}
.score-card::before{content:'★';font-size:100px;opacity:.05;position:absolute;top:-10px;right:10px;line-height:1;}
.sc-label{font-size:12px;color:var(--sub);letter-spacing:1px;font-weight:600;margin-bottom:4px;}
.sc-num{font-size:64px;font-weight:900;line-height:1.1;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sc-max{font-size:15px;color:var(--sub);margin-top:2px;}
.prog-wrap{margin-top:14px;}
.prog-bar{height:10px;background:var(--rim);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--violet),var(--gold));transition:width .7s cubic-bezier(.4,0,.2,1);width:0%;}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--sub);margin-top:5px;}
.sec-title{font-size:14px;font-weight:800;color:var(--sub);letter-spacing:.5px;margin-bottom:10px;}
.task{display:flex;align-items:center;gap:12px;background:var(--card);border:1.5px solid var(--rim);border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .22s;user-select:none;-webkit-tap-highlight-color:transparent;}
.task:active{opacity:.8;}
.task.done{border-color:var(--teal);background:linear-gradient(135deg,rgba(29,233,182,.07),rgba(29,233,182,.02));}
.task-chk{width:26px;height:26px;border-radius:8px;border:2px solid var(--rim);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;transition:.2s;color:#fff;}
.task.done .task-chk{background:var(--teal);border-color:var(--teal);}
.task-label{flex:1;font-size:14px;font-weight:600;}
.task.done .task-label{color:var(--teal);}
.task-pts{background:rgba(245,196,44,.12);border:1px solid rgba(245,196,44,.28);border-radius:8px;padding:4px 10px;font-size:16px;font-weight:900;color:var(--gold);white-space:nowrap;}
.task-pts small{font-size:10px;font-weight:600;color:var(--sub);}
.week-header{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:16px;}
.day-col{text-align:center;}
.day-name{font-size:10px;color:var(--sub);font-weight:700;margin-bottom:6px;}
.day-circle{width:36px;height:36px;border-radius:50%;border:2px solid var(--rim);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--sub);margin:0 auto;cursor:pointer;transition:.2s;}
.day-circle.today{border-color:var(--gold);color:var(--gold);}
.day-circle.selected{background:var(--gold);border-color:var(--gold);color:#07091a;}
.week-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.ws-card{background:var(--card);border:1.5px solid var(--rim);border-radius:12px;padding:12px;text-align:center;}
.ws-val{font-size:22px;font-weight:900;color:var(--gold);}
.ws-lbl{font-size:10px;color:var(--sub);margin-top:2px;}
.week-bars{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
.wbar-row{display:flex;align-items:center;gap:10px;}
.wbar-name{font-size:11px;color:var(--sub);width:44px;text-align:center;flex-shrink:0;}
.wbar-track{flex:1;height:8px;background:var(--rim);border-radius:99px;overflow:hidden;}
.wbar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--violet),var(--gold));transition:width .5s;}
.wbar-pct{font-size:10px;color:var(--sub);width:30px;text-align:right;flex-shrink:0;}
.badges-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:4px;}
.badge{background:var(--card);border:1.5px solid var(--rim);border-radius:14px;padding:14px;text-align:center;transition:.3s;}
.badge.earned{border-color:var(--gold);background:linear-gradient(135deg,rgba(245,196,44,.12),rgba(245,196,44,.03));}
.badge-ico{font-size:30px;margin-bottom:6px;}
.badge-name{font-size:12px;font-weight:800;color:var(--sub);}
.badge.earned .badge-name{color:var(--gold);}
.badge-req{font-size:10px;color:var(--sub);margin-top:3px;}
.date-row{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--rim);border-radius:12px;padding:10px 14px;margin-bottom:16px;}
.date-txt{font-size:13px;font-weight:700;}
.reset-btn{background:rgba(255,95,143,.1);border:1px solid rgba(255,95,143,.25);color:var(--rose);border-radius:8px;padding:5px 11px;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
.floater{position:fixed;font-size:26px;font-weight:900;color:var(--gold);pointer-events:none;z-index:1000;animation:floatUp 1.1s ease forwards;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-70px) scale(1.35);}}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:999;}
.hist-card{background:var(--card);border:1.5px solid var(--rim);border-radius:14px;padding:16px;margin-bottom:12px;}
.hist-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.hist-week{font-size:13px;font-weight:800;color:var(--txt);}
.hist-score{font-size:20px;font-weight:900;color:var(--gold);}
.hist-bars{display:flex;flex-direction:column;gap:5px;}
.hist-row{display:flex;align-items:center;gap:8px;}
.hist-day{font-size:10px;color:var(--sub);width:36px;text-align:center;flex-shrink:0;}
.hist-track{flex:1;height:6px;background:var(--rim);border-radius:99px;overflow:hidden;}
.hist-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--violet),var(--gold));}
.hist-pts{font-size:10px;color:var(--sub);width:24px;text-align:right;flex-shrink:0;}
.hist-empty{text-align:center;color:var(--sub);padding:40px 0;font-size:14px;}
</style>
</head>

    <div class='sc-max' id='d-max'>من 22 نقطة</div>
    <div class='prog-wrap'><div class='prog-bar'><div class='prog-fill' id='d-fill'></div></div><div class='prog-labels'><span>0%</span><span id='d-pct'>0%</span></div></div>
  </div>
  <div class='date-row'><div class='date-txt' id='d-date'>📅</div><button class='reset-btn' onclick='resetDay()'>🔄 يوم جديد</button></div>
  <div class='sec-title'>✅ مهام اليوم</div>
  <div id='task-list'></div>
</div>
<div id='panel-week' class='panel'>
  <div class='week-summary'>
    <div class='ws-card'><div class='ws-val' id='w-total'>0</div><div class='ws-lbl'>نقاط الأسبوع</div></div>
    <div class='ws-card'><div class='ws-val' id='w-days'>0</div><div class='ws-lbl'>أيام ملتزم</div></div>
    <div class='ws-card'><div class='ws-val' id='w-best'>0</div><div class='ws-lbl'>أفضل يوم</div></div>
  </div>
  <div class='week-header' id='week-days'></div>
  <div class='sec-title'>التقدم اليومي</div>
  <div class='week-bars' id='week-bars'></div>
  <div id='sel-day-tasks'></div>
</div>
<div id='panel-badges' class='panel'>
  <div class='badges-grid' id='badges-grid'></div>
</div>
<div id='panel-history' class='panel'>
  <div id='history-list'></div>
</div>
<script>

var TASKS = [
  {id:'prayers', name:'جميع الصلوات في وقتها', pts:5, icon:'🕌'},
  {id:'study',   name:'تعلم شيء مفيد 10 دقائق', pts:2, icon:'🧠'},
  {id:'sport',   name:'رياضة أو مشي أو كرة 30 دقيقة', pts:3, icon:'⚽'},
  {id:'room',    name:'ترتيب الغرفة', pts:2, icon:'🛏️'},
  {id:'help',    name:'مساعدة الوالد أو الوالدة', pts:2, icon:'❤️'},
  {id:'eat',     name:'الأكل بدون مماطلة أو اعتراض', pts:2, icon:'🍽️'},
  {id:'lang',    name:'لا سبّ ولا شتم ولا ألفاظ بذيئة', pts:3, icon:'🤐'},
  {id:'sleep',   name:'إغلاق الأجهزة وقت النوم', pts:3, icon:'🌙'}
];
var MAX = 0;
for (var i = 0; i < TASKS.length; i++) MAX += TASKS[i].pts;

var DAY_SHORT = ['أحد','إثن','ثلا','أرب','خمس','جمع','سبت'];
var DAY_FULL  = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];

var db;
try { db = JSON.parse(localStorage.getItem('ysr4') || 'null') || {week:{}}; } catch(e) { db = {week:{}}; }
function save() { try { localStorage.setItem('ysr4', JSON.stringify(db)); } catch(e) {} }

function weekKey(d) {
  var j = new Date(d.getFullYear(), 0, 1);
  var w = Math.ceil(((d - j) / 86400000 + j.getDay() + 1) / 7);
  return d.getFullYear() + '-' + w;
}
function todayDow() { return new Date().getDay(); }
function wData() {
  var k = weekKey(new Date());
  if (!db.week[k]) db.week[k] = {};
  return db.week[k];
}
function dayDone(dow) { var d = wData(); return d[dow] || []; }
function setDayDone(dow, arr) { var d = wData(); d[dow] = arr; save(); }
function scoreOf(arr) {
  var s = 0;
  for (var i = 0; i < TASKS.length; i++) if (arr.indexOf(TASKS[i].id) >= 0) s += TASKS[i].pts;
  return s;
}
function todayScore() { return scoreOf(dayDone(todayDow())); }
function weekTotal() { var s=0, d=wData(); for (var k in d) s += scoreOf(d[k]); return s; }
function weekDaysActive() { var n=0, d=wData(); for (var k in d) if (d[k].length > 0) n++; return n; }
function weekBest() { var b=0, d=wData(); for (var k in d) { var s=scoreOf(d[k]); if (s>b) b=s; } return b; }

/* ── TABS ── */
var selDow = todayDow();
function switchTab(t) {
  document.querySelectorAll('.tab').forEach(function(el) { el.classList.toggle('active', el.dataset.tab === t); });
  document.querySelectorAll('.panel').forEach(function(el) { el.classList.toggle('active', el.id === 'panel-' + t); });
  if (t === 'day')    renderDay();
  if (t === 'week')   renderWeek();
  if (t === 'badges') renderBadges();
  if (t === 'history') renderHistory();
}

/* ── DAY ── */
function renderDay() {
  var done  = dayDone(todayDow());
  var score = scoreOf(done);
  var pct   = Math.round(score / MAX * 100);

  document.getElementById('d-num').textContent  = score;
  document.getElementById('d-max').textContent  = 'من ' + MAX + ' نقطة';
  document.getElementById('d-fill').style.width = pct + '%';
  document.getElementById('d-pct').textContent  = pct + '%';

  var now = new Date();
  document.getElementById('d-date').textContent = '📅 ' + DAY_FULL[now.getDay()] + ' ' + now.toLocaleDateString('ar-SA');

  var html = '';
  for (var i = 0; i < TASKS.length; i++) {
    var t = TASKS[i];
    var isDone = done.indexOf(t.id) >= 0;
    html += '<div class="task' + (isDone ? ' done' : '') + '" id="tc_' + t.id + '" onclick="toggleTask(' + "'" + t.id + "'" + ',event)">'
          + '<div class="task-chk">' + (isDone ? '✓' : '') + '</div>'
          + '<div class="task-label">' + t.icon + ' ' + t.name + '</div>'
          + '<div class="task-pts">' + t.pts + '<small> نقطة</small></div>'
          + '</div>';
  }
  document.getElementById('task-list').innerHTML = html;
}

function toggleTask(id, e) {
  var done = [].concat(dayDone(todayDow()));
  var idx  = done.indexOf(id);
  if (idx >= 0) {
    done.splice(idx, 1);
  } else {
    done.push(id);
    for (var i = 0; i < TASKS.length; i++) {
      if (TASKS[i].id === id) { floatPts('+' + TASKS[i].pts, e); break; }
    }
  }
  setDayDone(todayDow(), done);
  renderDay();
  if (todayScore() === MAX) setTimeout(celebrate, 400);
  var card = document.getElementById('tc_' + id);
  if (card) {
    card.style.transform = 'scale(1.04)';
    setTimeout(function() { card.style.transform = ''; }, 200);
  }
}

function resetDay() {
  if (confirm('هل تريد مسح نقاط اليوم والبدء من جديد؟')) {
    setDayDone(todayDow(), []);
    renderDay();
  }
}

/* ── WEEK ── */
function renderWeek() {
  document.getElementById('w-total').textContent = weekTotal();
  document.getElementById('w-days').textContent  = weekDaysActive();
  document.getElementById('w-best').textContent  = weekBest();

  var html = '';
  for (var d = 0; d < 7; d++) {
    var isToday = d === todayDow(), isSel = d === selDow;
    var cls = 'day-circle' + (isToday ? ' today' : '') + (isSel ? ' selected' : '');
    var s   = scoreOf(dayDone(d));
    html += '<div class="day-col"><div class="day-name">' + DAY_SHORT[d] + '</div>'
          + '<div class="' + cls + '" onclick="selectDay(' + d + ')">' + (s > 0 ? s : '–') + '</div></div>';
  }
  document.getElementById('week-days').innerHTML = html;

  var bhtml = '';
  for (var d = 0; d < 7; d++) {
    var s = scoreOf(dayDone(d)), pct = Math.round(s / MAX * 100);
    bhtml += '<div class="wbar-row">'
           + '<div class="wbar-name">' + DAY_SHORT[d] + '</div>'
           + '<div class="wbar-track"><div class="wbar-fill" style="width:' + pct + '%"></div></div>'
           + '<div class="wbar-pct">' + pct + '%</div></div>';
  }
  document.getElementById('week-bars').innerHTML = bhtml;
  renderSelDay();
}

function selectDay(d) { selDow = d; renderWeek(); }

function renderSelDay() {
  var done = dayDone(selDow);
  var html = '<div class="sec-title" style="margin-top:16px">مهام ' + DAY_FULL[selDow] + '</div>';
  for (var i = 0; i < TASKS.length; i++) {
    var t = TASKS[i], isDone = done.indexOf(t.id) >= 0;
    html += '<div class="task' + (isDone ? ' done' : '') + '">'
          + '<div class="task-chk">' + (isDone ? '✓' : '') + '</div>'
          + '<div class="task-label">' + t.icon + ' ' + t.name + '</div>'
          + '<div class="task-pts">' + t.pts + '<small> نقطة</small></div>'
          + '</div>';
  }
  document.getElementById('sel-day-tasks').innerHTML = html;
}

/* ── BADGES ── */
var BADGES = [
  {name:'الانطلاقة',   icon:'🚀', req:'أول يوم تسجّل فيه مهمة',      check:function() { return weekDaysActive() >= 1; }},
  {name:'المصلي',      icon:'🕌', req:'الصلوات كاملة اليوم',           check:function() { return dayDone(todayDow()).indexOf('prayers') >= 0; }},
  {name:'منتصف اليوم', icon:'⚡', req:'10+ نقطة في يوم واحد',         check:function() { return weekBest() >= 10; }},
  {name:'بطل اليوم',   icon:'🏆', req:'كل نقاط اليوم كاملة',          check:function() { return weekBest() >= MAX; }},
  {name:'أسبوع ملتزم', icon:'📆', req:'5 أيام أو أكثر هذا الأسبوع',  check:function() { return weekDaysActive() >= 5; }},
  {name:'مئة نقطة',    icon:'💯', req:'100 نقطة هذا الأسبوع',         check:function() { return weekTotal() >= 100; }}
];
function renderBadges() {
  var html = '';
  for (var i = 0; i < BADGES.length; i++) {
    var b = BADGES[i], earned = b.check();
    html += '<div class="badge' + (earned ? ' earned' : '') + '">'
          + '<div class="badge-ico">' + b.icon + '</div>'
          + '<div class="badge-name">' + b.name + '</div>'
          + '<div class="badge-req">'  + b.req  + '</div>'
          + '</div>';
  }
  document.getElementById('badges-grid').innerHTML = html;
}

/* ── HELPERS ── */
function floatPts(txt, e) {
  var el = document.createElement('div');
  el.className   = 'floater';
  el.textContent = txt;
  el.style.left  = (e.clientX - 16) + 'px';
  el.style.top   = (e.clientY - 16) + 'px';
  document.body.appendChild(el);
  setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 1100);
}

function celebrate() {
  var cv = document.getElementById('confetti'), ctx = cv.getContext('2d');
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  var cols = ['#f5c42c','#1de9b6','#7c5cfc','#ff5f8f','#ffe270'], ps = [];
  for (var i = 0; i < 140; i++) ps.push({
    x:Math.random()*cv.width, y:-10,
    r:Math.random()*6+3, d:Math.random()*3+1.5,
    c:cols[Math.floor(Math.random()*5)], t:Math.random()*Math.PI*2
  });
  (function draw() {
    ctx.clearRect(0,0,cv.width,cv.height);
    var alive = false;
    for (var i = 0; i < ps.length; i++) {
      var p = ps[i];
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.c; ctx.fill();
      p.y += p.d + 1; p.x += Math.sin(p.t) * 2.2; p.t += 0.05;
      if (p.y < cv.height) alive = true;
    }
    if (alive) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,cv.width,cv.height);
  })();
}


/* ── HISTORY ── */
function getWeekDates(weekNum, year) {
  var jan1 = new Date(year, 0, 1);
  var days = (weekNum - 1) * 7 - jan1.getDay() + 1;
  var start = new Date(year, 0, 1 + days);
  return start.toLocaleDateString('ar-SA');
}

function renderHistory() {
  var keys = Object.keys(db.week).sort().reverse();
  var currentKey = weekKey(new Date());
  // استثني الأسبوع الحالي
  var pastKeys = keys.filter(function(k) { return k !== currentKey; });

  if (pastKeys.length === 0) {
    document.getElementById('history-list').innerHTML =
      '<div class="hist-empty">📭 لا يوجد سجل بعد<br><small>ستظهر هنا أسابيعك السابقة</small></div>';
    return;
  }

  var html = '';
  for (var ki = 0; ki < pastKeys.length; ki++) {
    var key = pastKeys[ki];
    var parts = key.split('-');
    var year = parts[0], weekNum = parts[1];
    var weekData = db.week[key];
    var total = 0;
    for (var k in weekData) total += scoreOf(weekData[k]);
    var daysActive = 0;
    for (var k in weekData) if (weekData[k].length > 0) daysActive++;

    html += '<div class="hist-card">';
    html += '<div class="hist-head">';
    html += '<div class="hist-week">📅 أسبوع ' + weekNum + ' — ' + year + '<br><small style="font-weight:400;color:var(--sub)">' + daysActive + ' أيام ملتزم</small></div>';
    html += '<div class="hist-score">' + total + '<small style="font-size:11px;color:var(--sub)"> نقطة</small></div>';
    html += '</div>';
    html += '<div class="hist-bars">';
    for (var d = 0; d < 7; d++) {
      var arr = weekData[d] || [];
      var s = scoreOf(arr);
      var pct = Math.round(s / MAX * 100);
      html += '<div class="hist-row">'
            + '<div class="hist-day">' + DAY_SHORT[d] + '</div>'
            + '<div class="hist-track"><div class="hist-fill" style="width:' + pct + '%"></div></div>'
            + '<div class="hist-pts">' + s + '</div>'
            + '</div>';
    }
    html += '</div></div>';
  }
  document.getElementById('history-list').innerHTML = html;
}

/* ── INIT ── */
switchTab('day');

</script>
</body>
</html>
